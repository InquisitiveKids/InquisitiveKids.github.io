  <script>
    (function () {
      var switcher = document.getElementById('lang-switcher');
      if (!switcher) return;
      switcher.querySelectorAll('[data-lang]').forEach(function (item) {
        item.addEventListener('click', function (e) {
          e.preventDefault();
          var lang = this.getAttribute('data-lang');
          LanguageVersions.setLanguage(lang).then(function () {
            var label = document.getElementById('lang-current');
            if (label) label.textContent = lang.toUpperCase();
          });
        });
      });
      var current = document.getElementById('lang-current');
      if (current && window.LanguageVersions) current.textContent = LanguageVersions.getCurrentLanguage().toUpperCase();
    })();
  </script>
